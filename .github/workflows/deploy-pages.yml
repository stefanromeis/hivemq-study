name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shell for static export
        run: pnpm --filter @hivemq-study/shell build
        env:
          NEXT_PUBLIC_BASE_PATH: /hivemq-study
          NEXT_PUBLIC_BUILD_MODE: static

      - name: Add root redirect to default locale
        run: |
          cat > apps/shell/out/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0;url=en" /></head>
            <body><a href="en">Redirect</a></body>
          </html>
          EOF

      - name: Add 404 fallback that redirects to default locale
        run: |
          cat > apps/shell/out/404.html << 'FALLBACK'
          <!DOCTYPE html>
          <html>
            <head>
              <script>
                (function () {
                  var basePath = '/hivemq-study';
                  var locales = ['en', 'de'];
                  var path = window.location.pathname;
                  // Strip basePath prefix
                  var rest = path.startsWith(basePath) ? path.slice(basePath.length) : path;
                  // Check if a locale prefix is already present
                  var hasLocale = locales.some(function (l) {
                    return rest === '/' + l || rest.startsWith('/' + l + '/');
                  });
                  if (!hasLocale) {
                    // Prepend default locale and redirect
                    var target = basePath + '/en' + (rest.startsWith('/') ? rest : '/' + rest);
                    window.location.replace(target + window.location.search + window.location.hash);
                  }
                })();
              </script>
            </head>
            <body><p>Redirecting…</p></body>
          </html>
          FALLBACK

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/shell/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
